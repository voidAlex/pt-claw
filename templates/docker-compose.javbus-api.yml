# javbus-api — JavBus REST API 服务
# 部署: docker compose up -d
# 文档: https://github.com/ovnrain/javbus-api
#
# 注意: 美国 IP 会触发 JavBus 登录页面，请使用其他地区代理
# 部署后配置环境变量 JAVBUS_API_URL=http://<host>:8922

services:
  javbus-api:
    image: ovnrain/javbus-api:latest
    container_name: javbus-api
    restart: unless-stopped
    ports:
      - "8922:3000"
    environment:
      # 代理（必须，否则无法访问 JavBus）
      - HTTP_PROXY=<your-proxy>
      - HTTPS_PROXY=<your-proxy>
    #   - SSL_CERT=/certs/ssl.crt
    #   - SSL_KEY=/certs/ssl.key
    # volumes:
    #   - /path/to/certs:/certs
