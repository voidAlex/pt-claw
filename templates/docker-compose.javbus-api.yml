# javbus-api — JavBus REST API 服务
# 部署: docker compose up -d
# 文档: https://github.com/ovnrain/javbus-api
#
# 注意: 美国 IP 会触发 JavBus 登录页面，请使用其他地区代理
# 部署后在 secrets.env 中设置 JAVBUS_API_URL=http://localhost:8922

services:
  javbus-api:
    image: ovnrain/javbus-api:latest
    container_name: javbus-api
    restart: unless-stopped
    ports:
      - "8922:3000"
    environment:
      - HTTP_PROXY=<PT_PROXY>
      - HTTPS_PROXY=<PT_PROXY>
